spring:
  application:
    name: kamerwork-backend
  data:
    mongodb:
      uri: mongodb://localhost:27017/kamerwork
  mail:
    enabled: false
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  
server:
  port: 8081
  servlet:
    context-path: /api

recaptcha:
  enabled: false
  secret: ${RECAPTCHA_SECRET:6LeJXpksAAAAALFkDcpvugX2KbKrvLy9aKPDdY8-}

logging:
  level:
    root: INFO
    org.springframework.boot: DEBUG
